<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Patient Pool - MedGenomics</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006028",
                        "secondary": "#005cba",
                        "tertiary": "#794600",
                        "error": "#ba1a1a",
                        "on-surface": "#1a1c1c",
                        "surface": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container": "#eeeeee",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#6f7a6e",
                        "on-surface-variant": "#3f493f"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #006028 0%, #1a7a3a 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex min-h-screen">
<aside class="hidden xl:flex h-screen w-64 fixed left-0 top-0 bg-slate-50 flex-col pt-20 py-4 space-y-2 z-40">
    <div class="px-6 mb-6">
        <div class="flex items-center gap-3 py-4">
            <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl text-white">
                <span class="material-symbols-outlined">genetics</span>
            </div>
            <div>
                <h3 class="text-sm font-bold text-on-surface leading-tight">Precision Care</h3>
                <p class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">Clinical Atelier</p>
            </div>
        </div>
    </div>
    <nav class="flex-1 space-y-1 px-2">
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all hover:translate-x-1" href="/">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-['Manrope'] text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 bg-green-50 text-green-800 rounded-lg" href="/patient-pool">
            <span class="material-symbols-outlined">group</span>
            <span class="font-['Manrope'] text-sm font-medium">Patient Pool</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all hover:translate-x-1" href="/inventory">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="font-['Manrope'] text-sm font-medium">Inventory</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all hover:translate-x-1" href="/analytics">
            <span class="material-symbols-outlined">analytics</span>
            <span class="font-['Manrope'] text-sm font-medium">Analytics</span>
        </a>
    </nav>
</aside>

<main class="xl:pl-64 pt-16 min-h-screen w-full">
    <header class="bg-white/80 backdrop-blur-xl fixed top-0 w-full z-50 h-16 flex items-center px-6">
        <a href="/" class="flex items-center gap-2 text-green-900 font-bold">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="ml-4 text-xl font-bold">Patient Pool</h1>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight">Patient Pool</h2>
                <p class="text-on-surface-variant">Comprehensive database of 1,248 active genomic participant profiles.</p>
            </div>
            <button class="flex items-center gap-2 px-6 py-3 bg-primary-gradient text-white font-bold rounded-xl shadow-lg">
                <span class="material-symbols-outlined">person_add</span>
                <span>Add New Patient</span>
            </button>
        </div>

        <div class="bg-surface-container-low rounded-2xl p-6 mb-8">
            <div class="flex gap-4 mb-6">
                <select class="bg-white border-none rounded-lg text-sm font-medium py-2 px-3 focus:ring-1 focus:ring-primary flex-1">
                    <option>All Ages</option>
                    <option>18 - 35</option>
                    <option>36 - 60</option>
                    <option>60+</option>
                </select>
                <select class="bg-white border-none rounded-lg text-sm font-medium py-2 px-3 focus:ring-1 focus:ring-primary flex-1">
                    <option>High (>80%)</option>
                    <option>Moderate (40-80%)</option>
                    <option>Low (<40%)</option>
                </select>
                <button class="px-4 py-2 bg-white rounded-lg text-sm font-bold hover:bg-slate-50">Clear filters</button>
            </div>
        </div>

        <div id="patientGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-64"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-64"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-64"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-64"></div>
        </div>
    </div>
</main>

<script>
fetch('/api/patients')
    .then(r => r.json())
    .then(patients => {
        const grid = document.getElementById('patientGrid');
        grid.innerHTML = patients.map(p => `
            <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm hover:shadow-lg transition-all cursor-pointer group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-${p.risk_score > 80 ? 'error' : p.risk_score > 40 ? 'tertiary' : 'primary'}"></div>
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold text-slate-600 text-xs">
                            ${p.initials}
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-on-surface">${p.name}</h3>
                            <p class="text-[10px] text-outline font-medium uppercase">ID: ${p.id}</p>
                        </div>
                    </div>
                    <span class="px-2 py-0.5 bg-${p.risk_score > 80 ? 'error' : 'primary'}-container text-${p.risk_score > 80 ? 'error' : 'primary'} text-[10px] font-bold rounded">
                        ${p.risk_score > 80 ? 'CRITICAL' : 'ACTIVE'}
                    </span>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-6">
                    <div class="text-center p-2 bg-surface-container-low rounded-lg">
                        <p class="text-[9px] uppercase text-outline font-bold">Age</p>
                        <p class="text-sm font-bold text-on-surface">${p.age}</p>
                    </div>
                    <div class="text-center p-2 bg-surface-container-low rounded-lg">
                        <p class="text-[9px] uppercase text-outline font-bold">Risk</p>
                        <p class="text-sm font-bold text-${p.risk_score > 80 ? 'error' : 'primary'}">${p.risk_score}%</p>
                    </div>
                    <div class="text-center p-2 bg-surface-container-low rounded-lg">
                        <p class="text-[9px] uppercase text-outline font-bold">DNA</p>
                        <p class="text-sm font-bold text-secondary">${p.dna_marker}</p>
                    </div>
                </div>
            </div>
        `).join('');
    })
    .catch(err => console.error('Error loading patients:', err));
</script>
</body>
</html>
