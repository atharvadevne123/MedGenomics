<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Inventory Pool - MedGenomics</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006028",
                        "secondary": "#005cba",
                        "tertiary": "#794600",
                        "error": "#ba1a1a",
                        "on-surface": "#1a1c1c",
                        "surface": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container": "#eeeeee",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#6f7a6e",
                        "on-surface-variant": "#3f493f"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex min-h-screen">
<aside class="hidden xl:flex h-screen w-64 fixed left-0 top-0 bg-slate-50 flex-col pt-20 py-4 z-40">
    <div class="px-6 mb-6">
        <div class="flex items-center gap-3 py-4">
            <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl text-white">
                <span class="material-symbols-outlined">genetics</span>
            </div>
            <div>
                <h3 class="text-sm font-bold text-on-surface">Precision Care</h3>
                <p class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">Clinical Atelier</p>
            </div>
        </div>
    </div>
    <nav class="flex-1 space-y-1 px-2">
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all" href="/">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all" href="/patient-pool">
            <span class="material-symbols-outlined">group</span>
            <span class="text-sm font-medium">Patient Pool</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 bg-green-50 text-green-800 rounded-lg" href="/inventory">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-sm font-medium">Inventory</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg transition-all" href="/analytics">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-sm font-medium">Analytics</span>
        </a>
    </nav>
</aside>

<main class="xl:pl-64 pt-16 min-h-screen w-full">
    <header class="bg-white/80 backdrop-blur-xl fixed top-0 w-full z-50 h-16 flex items-center px-6">
        <a href="/" class="flex items-center gap-2 text-green-900 font-bold">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="ml-4 text-xl font-bold">Inventory</h1>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight">Inventory Pool</h2>
                <p class="text-on-surface-variant">Real-time management of clinical supplies and laboratory hardware.</p>
            </div>
            <button class="flex items-center gap-2 px-6 py-3 bg-primary text-white font-bold rounded-lg shadow-lg">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span>Order Supplies</span>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <select class="bg-white border-none rounded-lg text-sm font-medium py-2 px-3 focus:ring-1 focus:ring-primary">
                <option>All Supplies</option>
                <option>Kits</option>
                <option>Reagents</option>
                <option>Equipment</option>
            </select>
            <select class="bg-white border-none rounded-lg text-sm font-medium py-2 px-3 focus:ring-1 focus:ring-primary">
                <option>All Status</option>
                <option>Critical (<10%)</option>
                <option>Low (<25%)</option>
                <option>Healthy</option>
            </select>
            <select class="bg-white border-none rounded-lg text-sm font-medium py-2 px-3 focus:ring-1 focus:ring-primary">
                <option>Global Providers</option>
            </select>
            <div class="bg-primary/5 p-4 rounded-lg border border-primary/10 flex items-center gap-2">
                <span class="text-2xl font-bold text-primary">12</span>
                <p class="text-xs font-bold text-primary/70">Low Stock</p>
            </div>
        </div>

        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-48"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-48"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-48"></div>
            <div class="animate-pulse bg-surface-container-lowest rounded-xl p-6 h-48"></div>
        </div>
    </div>
</main>

<script>
const statusColor = {
    'critical': { bg: 'error', text: 'error-container' },
    'low': { bg: 'tertiary', text: 'tertiary-fixed' },
    'healthy': { bg: 'primary', text: 'primary-container' }
};

fetch('/api/inventory')
    .then(r => r.json())
    .then(items => {
        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = items.map(item => {
            const percentage = (item.qty_on_hand / (item.reorder_point * 2)) * 100;
            let status = 'healthy';
            if (percentage < 10) status = 'critical';
            else if (percentage < 25) status = 'low';

            return `
                <div class="bg-surface-container-lowest rounded-xl p-6 hover:shadow-lg transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-2 py-1 bg-secondary/10 text-secondary text-[10px] font-bold rounded uppercase">
                            ${item.category}
                        </span>
                        <span class="material-symbols-outlined text-slate-300">more_vert</span>
                    </div>
                    <h3 class="text-lg font-bold text-on-surface mb-1">${item.item_name}</h3>
                    <p class="text-xs text-on-surface-variant mb-6">${item.supplier}</p>
                    <div class="mt-auto">
                        <div class="flex justify-between text-[10px] font-bold uppercase mb-2">
                            <span class="${status === 'critical' ? 'text-error' : status === 'low' ? 'text-tertiary' : 'text-primary'}">
                                ${status.toUpperCase()}
                            </span>
                            <span class="text-on-surface">${item.qty_on_hand} / ${item.reorder_point * 2} Units</span>
                        </div>
                        <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full rounded-full bg-${status === 'critical' ? 'error' : status === 'low' ? 'tertiary' : 'primary'}" style="width: ${Math.min(percentage, 100)}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    })
    .catch(err => console.error('Error loading inventory:', err));
</script>
</body>
</html>
