<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Genomic Records - MedGenomics</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006028",
                        "secondary": "#005cba",
                        "tertiary": "#794600",
                        "error": "#ba1a1a",
                        "on-surface": "#1a1c1c",
                        "surface": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container": "#eeeeee",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#6f7a6e",
                        "on-surface-variant": "#3f493f"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<main class="pt-16 min-h-screen">
    <header class="bg-white/80 backdrop-blur-xl fixed top-0 w-full z-50 h-16 flex items-center px-6">
        <a href="/" class="flex items-center gap-2 text-green-900 font-bold">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="ml-4 text-xl font-bold">Genomic Records</h1>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Genomic Records</h1>
            <p class="text-on-surface-variant">Detailed genomic profiles, variant data, and clinical annotations for all patients.</p>
        </div>

        <div class="bg-surface-container-low rounded-xl p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label for="recordSearch" class="sr-only">Search by patient ID, gene, or variant</label>
                    <input id="recordSearch" type="text" placeholder="Search by patient ID, gene, or variant..." aria-label="Search genomic records" class="w-full bg-white border-none rounded-lg text-sm py-2 px-4 focus:ring-1 focus:ring-primary"/>
                </div>
                <button aria-label="Advanced search options (coming soon)" class="px-6 py-2 bg-white rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors">Advanced Search</button>
            </div>
        </div>

        <div id="recordsTable" class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
            <div class="p-6">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-surface-container">
                            <th scope="col" class="text-left text-sm font-bold text-on-surface-variant pb-4">Patient ID</th>
                            <th scope="col" class="text-left text-sm font-bold text-on-surface-variant pb-4">Gene</th>
                            <th scope="col" class="text-left text-sm font-bold text-on-surface-variant pb-4">Variant</th>
                            <th scope="col" class="text-left text-sm font-bold text-on-surface-variant pb-4">Risk Level</th>
                            <th scope="col" class="text-left text-sm font-bold text-on-surface-variant pb-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="animate-pulse" aria-label="Loading records">
                            <td class="py-4"><div class="h-4 bg-surface-container rounded w-24"></div></td>
                            <td class="py-4"><div class="h-4 bg-surface-container rounded w-16"></div></td>
                            <td class="py-4"><div class="h-4 bg-surface-container rounded w-12"></div></td>
                            <td class="py-4"><div class="h-4 bg-surface-container rounded w-14"></div></td>
                            <td class="py-4"><div class="h-4 bg-surface-container rounded w-16"></div></td>
                        </tr>
                    </tbody>
                </table>
                <p id="tableError" class="hidden text-center text-error py-6 text-sm" role="alert"></p>
            </div>
        </div>
    </div>
</main>

<script>
function escapeHtml(str) {
    return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

async function loadRecords() {
    try {
        const response = await fetch('/api/patients');
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        const patients = await response.json();

        const tbody = document.getElementById('tableBody');

        if (!patients.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-on-surface-variant">No genomic records found.</td></tr>';
            return;
        }

        tbody.innerHTML = patients.map(p => {
            const riskClass = p.risk_score > 80
                ? 'bg-red-50 text-error'
                : p.risk_score > 40
                    ? 'bg-amber-50 text-tertiary'
                    : 'bg-green-50 text-primary';
            const statusLabel = p.risk_score > 80 ? 'CRITICAL' : 'ACTIVE';
            const gene = Object.keys(p.genomic_data || {}).find(k => k !== 'expression_level') || 'N/A';
            return `
                <tr class="border-b border-surface-container hover:bg-surface-container-low transition-colors">
                    <td class="py-4 text-sm font-medium font-mono">${escapeHtml(p.id)}</td>
                    <td class="py-4 text-sm">${escapeHtml(gene)}</td>
                    <td class="py-4 text-sm font-mono">${escapeHtml(p.dna_marker)}</td>
                    <td class="py-4">
                        <span class="px-2 py-1 text-xs font-bold rounded ${riskClass}">
                            ${escapeHtml(String(p.risk_score))}%
                        </span>
                    </td>
                    <td class="py-4">
                        <span class="text-xs font-medium text-on-surface-variant">${escapeHtml(statusLabel)}</span>
                    </td>
                </tr>
            `;
        }).join('');
    } catch (err) {
        console.error('Error loading records:', err);
        document.getElementById('tableBody').innerHTML = '';
        const errorEl = document.getElementById('tableError');
        errorEl.textContent = 'Failed to load genomic records. Please refresh the page.';
        errorEl.classList.remove('hidden');
    }
}

loadRecords();
</script>
</body>
</html>
