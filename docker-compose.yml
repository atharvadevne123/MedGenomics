services:
  postgres:
    image: postgres:16-alpine
    container_name: medgenomics-postgres
    environment:
      POSTGRES_DB: medgenomics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: medgenomics-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    environment:
      DATABASE_URL: postgresql://admin:secure123@postgres:5432/medgenomics
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
